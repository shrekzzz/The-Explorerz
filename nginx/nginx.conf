# ─────────────────────────────────────────
# Nginx Reverse Proxy Configuration
# The-Explorerz Production Deployment
# ─────────────────────────────────────────

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# Upstream API server
upstream api_server {
    server api:3001;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name deshyatra.com www.deshyatra.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name deshyatra.com www.deshyatra.com;

    # ─── SSL ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/deshyatra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deshyatra.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ─── Security Headers ────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip Compression ────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml
        application/wasm;

    # ─── Static Frontend Assets ──────────
    root /var/www/deshyatra/dist;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── API Proxy ───────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Max body size for uploads
        client_max_body_size 10m;
    }

    # Auth endpoints get stricter rate limiting
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── SPA Fallback ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Block sensitive files ───────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* (\.env|\.git|\.log|\.bak)$ {
        deny all;
        return 404;
    }
}
